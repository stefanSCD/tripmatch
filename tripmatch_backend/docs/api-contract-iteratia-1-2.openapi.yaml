          items:
            $ref: "#/components/schemas/AiDraftActivityDto"
      required: [dayNumber, date, activities]

    AiDraftContentDto:
      type: object
      description: endDate cannot be before startDate.
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 255
          pattern: "^.*\\S.*$"
