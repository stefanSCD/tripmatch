        If categories is present, duplicate category values are rejected (400),
        and existing categories missing from payload are deleted.
      properties:
        totalBudget:
          type: number
          minimum: 0.01
        currency:
          type: string
          maxLength: 64
          pattern: "^.*\\S.*$"
        spentTotal:
          type: number
          minimum: 0
          nullable: true
        categories:
          type: array
          maxItems: 20
          nullable: true
          items:
            $ref: "#/components/schemas/UpsertTripBudgetCategoryRequest"
      required: [totalBudget, currency]

    TripBudgetCategoryResponse:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/BudgetCategory"
        allocatedAmount: { type: number }
        estimatedTotal: { type: number }
        spentTotal: { type: number }
        remainingByEstimated: { type: number }
        remainingBySpent: { type: number }
        estimatedProgressPct: { type: number }
        spentProgressPct: { type: number }

    TripBudgetResponse:
