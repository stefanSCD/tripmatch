        destinationSummary:
          type: string
          maxLength: 512
          pattern: "^.*\\S.*$"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isFlexibleDate:
          type: boolean
      required: [sharedPreferences, budgetMin, budgetMax, destinationSummary, startDate, endDate, isFlexibleDate]

