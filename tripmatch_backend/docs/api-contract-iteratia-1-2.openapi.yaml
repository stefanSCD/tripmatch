        remainingBySpent: { type: number }
        estimatedProgressPct: { type: number }
        spentProgressPct: { type: number }
        categories:
          type: array
          items:
            $ref: "#/components/schemas/TripBudgetCategoryResponse"

    GenerateAiDraftRequest:
      type: object
      description: >
        Either destinationHint or tripType must be provided.
        endDate cannot be before startDate.
      properties:
        destinationHint:
          type: string
          maxLength: 255
        tripType:
          type: string
          maxLength: 100
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budgetTotal:
          type: number
          minimum: 0.01
        currency:
          type: string
          maxLength: 64
          pattern: "^.*\\S.*$"
        interests:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 100
            pattern: "^.*\\S.*$"
        pace:
          type: string
          maxLength: 32
          pattern: "^.*\\S.*$"
        notes:
          type: string
          maxLength: 2000
      required: [startDate, endDate, budgetTotal, currency, pace]

    UpdateAiDraftRequest:
      type: object
      description: At least one field is required (title or content).
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 255
